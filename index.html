  function initializeCategories() {
    categories = defaultCategories.map((cat, idx) => ({
      id: `cat_${Date.now()}_${idx}`,
      name: cat.name,
      products: cat.products.map(p => ({ ...p, boxes: p.boxes||0, secondValue: p.secondValue||0 })),
      deleted: []
    }));
  }

  function saveToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ categories })); }

  function loadFromStorage() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) { initializeCategories(); return; }
    try {
      const data = JSON.parse(raw);
      if (data.categories && Array.isArray(data.categories)) categories = data.categories;
      else initializeCategories();
    } catch(e) { initializeCategories(); }
  }

  loadFromStorage();
  if (categories.length === 0) initializeCategories();
  activeCategoryId = categories[0]?.id || null;

  // --- UI Rendering ---
  function renderTabs() {
    const container = document.getElementById('tabsContainer');
    let html = '';
    categories.forEach(cat => {
      const activeClass = (cat.id === activeCategoryId) ? 'active' : '';
      html += `<div class="tab ${activeClass}" data-cat-id="${cat.id}">${escapeHtml(cat.name)}</div>`;
    });
    container.innerHTML = html;
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => switchCategory(tab.dataset.catId));
    });
  }

  function renderTabContent() {
    const container = document.getElementById('tabContentContainer');
    let html = '';
    categories.forEach(cat => {
      const activeClass = (cat.id === activeCategoryId) ? 'active' : '';
      html += `<div id="pane_${cat.id}" class="tab-pane ${activeClass}"><div class="product-list" id="list_${cat.id}"></div></div>`;
    });
    container.innerHTML = html;
  }

  function renderCurrentCategoryProducts(filterText = '') {
    const cat = categories.find(c => c.id === activeCategoryId);
    if (!cat) return;
    const listEl = document.getElementById(`list_${cat.id}`);
    if (!listEl) return;
    const term = filterText.trim().toLowerCase();
    let filtered = cat.products;
    if (term) filtered = cat.products.filter(p => p.name.toLowerCase().includes(term));

    if (sortableInstances[cat.id]) {
      sortableInstances[cat.id].destroy();
      delete sortableInstances[cat.id];
    }

    if (!filtered.length) {
      listEl.innerHTML = `<div class="no-results">🔎 Δεν βρέθηκαν προϊόντα</div>`;
      return;
    }

    let html = '';
    filtered.forEach((p) => {
      const originalIndex = cat.products.findIndex(prod => prod.name === p.name);
      const unitLabel = { pieces:'Τεμάχια', kg:'Κιλά', pallet:'Παλέτα' }[p.secondUnit] || 'Τεμάχια';
      const step = p.secondUnit === 'kg' ? '0.1' : '1';
      const boxesVal = p.boxes === 0 ? '' : p.boxes;
      const secondVal = p.secondValue === 0 ? '' : p.secondValue;
      const dragHandle = term ? '' : `<span class="drag-handle" title="Σύρε για ταξινόμηση">☰</span>`;
      const inputMode = (p.secondUnit === 'kg') ? 'decimal' : 'numeric';

      html += `
        <div class="product" data-index="${originalIndex}">
          <div class="product-header">
            ${dragHandle}
            <div class="product-name">${escapeHtml(p.name)}</div>
            <div class="product-actions">
              <button class="edit-product-btn" onclick="openEditProductModal('${cat.id}', ${originalIndex})" title="Επεξεργασία">✏️</button>
              <button class="delete-btn" onclick="deleteProduct('${cat.id}', ${originalIndex})" title="Διαγραφή">🗑️</button>
            </div>
          </div>
          <div class="product-controls">
            <div class="qty-item">
              <div class="qty-label"><span>Κιβώτια</span></div>
              <div class="qty-control">
                <button onclick="changeQty('${cat.id}', ${originalIndex}, 'boxes', -1)">–</button>
                <input type="number" min="0" step="1" value="${boxesVal}" inputmode="numeric" onchange="updateQtyFromInput('${cat.id}', ${originalIndex}, 'boxes', this.value)">
                <button onclick="changeQty('${cat.id}', ${originalIndex}, 'boxes', 1)">+</button>
              </div>
            </div>
            <div class="qty-item">
              <div class="qty-label" onclick="openUnitModal('${cat.id}', ${originalIndex})">
                <span>${unitLabel}</span> <span>⚙️</span>
              </div>
              <div class="qty-control">
                <button onclick="changeQty('${cat.id}', ${originalIndex}, 'second', -1)">–</button>
                <input type="number" min="0" step="${step}" value="${secondVal}" inputmode="${inputMode}" onchange="updateQtyFromInput('${cat.id}', ${originalIndex}, 'second', this.value)">
                <button onclick="changeQty('${cat.id}', ${originalIndex}, 'second', 1)">+</button>
              </div>
            </div>
          </div>
        </div>
      `;
    });
    listEl.innerHTML = html;

    if (!term) {
      sortableInstances[cat.id] = new Sortable(listEl, {
        handle: '.drag-handle',
        animation: 150,
        onEnd: function(evt) {
          const items = Array.from(listEl.children);
          const newOrder = items.map(el => parseInt(el.dataset.index,10));
          const oldProducts = cat.products;
          cat.products = newOrder.map(idx => oldProducts[idx]);
          saveToStorage();
        }
      });
    }
  }

  function switchCategory(catId) {
    activeCategoryId = catId;
    renderTabs();
    renderTabContent();
    document.getElementById('search').value = '';
    renderCurrentCategoryProducts('');
  }

  function refreshUI() {
    renderTabs();
    renderTabContent();
    renderCurrentCategoryProducts(document.getElementById('search').value);
  }

  window.filterActiveTab = () => renderCurrentCategoryProducts(document.getElementById('search').value);

  // --- Ποσότητες ---
  window.changeQty = (catId, idx, type, delta) => {
    const cat = categories.find(c => c.id === catId);
    if (!cat) return;
    const prod = cat.products[idx];
    let cur = (type === 'boxes') ? prod.boxes : prod.secondValue;
    let newVal = Math.max(0, cur + delta);
    if (type === 'boxes') prod.boxes = newVal;
    else prod.secondValue = newVal;
    saveToStorage();
    renderCurrentCategoryProducts(document.getElementById('search').value);
  };
  window.updateQtyFromInput = (catId, idx, type, val) => {
    const cat = categories.find(c => c.id === catId);
    if (!cat) return;
    const prod = cat.products[idx];
    let num = parseFloat(val);
    if (isNaN(num) || num < 0) num = 0;
    if (type === 'boxes') prod.boxes = Math.floor(num);
    else prod.secondValue = num;
    saveToStorage();
    renderCurrentCategoryProducts(document.getElementById('search').value);
  };

  // --- Προϊόντα ---
  window.deleteProduct = (catId, idx) => {
    const cat = categories.find(c => c.id === catId);
    const prod = cat.products[idx];
    if (!confirm(`Διαγραφή "${prod.name}";`)) return;
    cat.deleted.push({ name: prod.name, secondUnit: prod.secondUnit });
    cat.products.splice(idx, 1);
    saveToStorage();
    refreshUI();
  };
  window.openAddProductModal = () => {
    document.getElementById('addProductModal').style.display = 'flex';
    document.getElementById('newProductName').value = '';
  };
  window.closeAddModal = (e) => { if (!e || e.target.id === 'addProductModal') document.getElementById('addProductModal').style.display = 'none'; };
  window.addNewProduct = () => {
    const input = document.getElementById('newProductName');
    const name = input.value.trim();
    if (!name) { alert('Δώστε όνομα'); return; }
    const cat = categories.find(c => c.id === activeCategoryId);
    if (cat.products.some(p => p.name.toLowerCase() === name.toLowerCase())) { alert('Υπάρχει ήδη'); return; }
    cat.products.push({ name, boxes:0, secondValue:0, secondUnit:'pieces' });
    input.value = '';
    document.getElementById('addProductModal').style.display = 'none';
    saveToStorage();
    refreshUI();
  };
  window.openEditProductModal = (catId, idx) => {
    const cat = categories.find(c => c.id === catId);
    pendingEditProduct = { catId, idx };
    document.getElementById('editProductNameInput').value = cat.products[idx].name;
    document.getElementById('editProductModal').style.display = 'flex';
  };
  window.closeEditModal = (e) => { if (!e || e.target.id === 'editProductModal') document.getElementById('editProductModal').style.display = 'none'; };
  window.saveEditedProduct = () => {
    if (!pendingEditProduct) return;
    const { catId, idx } = pendingEditProduct;
    const newName = document.getElementById('editProductNameInput').value.trim();
    if (!newName) { alert('Το όνομα δεν μπορεί να είναι κενό'); return; }
    const cat = categories.find(c => c.id === catId);
    if (cat.products.some((p,i) => i !== idx && p.name.toLowerCase() === newName.toLowerCase())) { alert('Υπάρχει ήδη προϊόν με αυτό το όνομα'); return; }
    cat.products[idx].name = newName;
    saveToStorage();
    document.getElementById('editProductModal').style.display = 'none';
    pendingEditProduct = null;
    refreshUI();
  };
  window.openUnitModal = (catId, idx) => {
    pendingUnitChange = { catId, idx };
    document.getElementById('unitModal').style.display = 'flex';
  };
  window.closeModal = (e) => { if (e.target.id === 'unitModal') document.getElementById('unitModal').style.display = 'none'; };
  document.querySelectorAll('.unit-option').forEach(opt => opt.addEventListener('click', function() {
    if (!pendingUnitChange) return;
    const { catId, idx } = pendingUnitChange;
    const cat = categories.find(c => c.id === catId);
    cat.products[idx].secondUnit = this.dataset.unit;
    document.getElementById('unitModal').style.display = 'none';
    pendingUnitChange = null;
    saveToStorage();
    refreshUI();
  }));

  // --- Κατηγορίες ---
  window.openCategoryManager = () => {
    renderCategoryManagerList();
    document.getElementById('categoryManagerModal').style.display = 'flex';
  };
  window.closeCategoryManager = (e) => { if (!e || e.target.id === 'categoryManagerModal') document.getElementById('categoryManagerModal').style.display = 'none'; };
  function renderCategoryManagerList() {
    const container = document.getElementById('categoryListContainer');
    let html = '';
    categories.forEach(cat => {
      html += `<div class="category-item"><span class="category-name">${escapeHtml(cat.name)}</span><div class="category-actions"><button onclick="renameCategory('${cat.id}')" title="Μετονομασία">✏️</button><button onclick="deleteCategory('${cat.id}')" title="Διαγραφή" ${categories.length<=1?'disabled':''}>🗑️</button></div></div>`;
    });
    container.innerHTML = html || '<div style="padding:10px;text-align:center">Καμία κατηγορία</div>';
  }
  window.renameCategory = (catId) => {
    const cat = categories.find(c => c.id === catId);
    const newName = prompt('Νέο όνομα κατηγορίας:', cat.name);
    if (newName && newName.trim()) { cat.name = newName.trim(); saveToStorage(); refreshUI(); renderCategoryManagerList(); }
  };
  window.deleteCategory = (catId) => {
    if (categories.length <= 1) { alert('Πρέπει να υπάρχει τουλάχιστον μία κατηγορία.'); return; }
    if (!confirm('Διαγραφή κατηγορίας και όλων των προϊόντων της;')) return;
    categories = categories.filter(c => c.id !== catId);
    if (activeCategoryId === catId) activeCategoryId = categories[0].id;
    saveToStorage();
    refreshUI();
    renderCategoryManagerList();
  };
  window.addNewCategory = () => {
    const inp = document.getElementById('newCategoryName');
    const name = inp.value.trim();
    if (!name) { alert('Δώστε όνομα'); return; }
    categories.push({ id: `cat_${Date.now()}`, name, products: [], deleted: [] });
    inp.value = '';
    saveToStorage();
    refreshUI();
    renderCategoryManagerList();
  };

  // --- Διεγραμμένα ---
  window.showDeletedModal = () => {
    const container = document.getElementById('deletedListContainer');
    let html = '';
    categories.forEach(cat => {
      if (!cat.deleted.length) return;
      html += `<h4 style="margin:10px 0 4px; color:#1e3a5f;">${escapeHtml(cat.name)}</h4>`;
      cat.deleted.forEach((item, idx) => {
        const unitLabel = { pieces:'Τεμ', kg:'Kg', pallet:'Παλ' }[item.secondUnit]||'Τεμ';
        html += `<div class="deleted-item"><span><strong>${escapeHtml(item.name)}</strong> (${unitLabel})</span><div style="display:flex; gap:4px;"><button class="restore-btn" onclick="restoreProduct('${cat.id}', ${idx})">↩️</button><button class="perm-delete-btn" onclick="permanentDelete('${cat.id}', ${idx})">🗑️</button></div></div>`;
      });
    });
    container.innerHTML = html || '<div style="text-align:center;padding:20px;">📭 Κανένα διεγραμμένο</div>';
    document.getElementById('deletedModal').style.display = 'flex';
  };
  window.closeDeletedModal = () => document.getElementById('deletedModal').style.display = 'none';
  window.restoreProduct = (catId, delIdx) => {
    const cat = categories.find(c => c.id === catId);
    const item = cat.deleted[delIdx];
    if (cat.products.find(p => p.name === item.name)) { alert('Υπάρχει ήδη προϊόν με αυτό το όνομα.'); return; }
    cat.products.push({ name: item.name, boxes:0, secondValue:0, secondUnit: item.secondUnit });
    cat.deleted.splice(delIdx, 1);
    saveToStorage();
    refreshUI();
    showDeletedModal();
  };
  window.permanentDelete = (catId, delIdx) => {
    if (confirm('Οριστική διαγραφή;')) {
      const cat = categories.find(c => c.id === catId);
      cat.deleted.splice(delIdx, 1);
      saveToStorage();
      showDeletedModal();
    }
  };
  window.clearAllQuantities = () => {
    if (!confirm('Μηδενισμός όλων των ποσοτήτων σε ΟΛΕΣ τις κατηγορίες;')) return;
    categories.forEach(cat => cat.products.forEach(p => { p.boxes=0; p.secondValue=0; p.secondUnit='pieces'; }));
    saveToStorage();
    refreshUI();
  };
  window.scanBarcode = () => {
    const code = prompt('Εισάγετε barcode ή όνομα:');
    if (!code) return;
    const cat = categories.find(c => c.id === activeCategoryId);
    const prod = cat.products.find(p => p.name.toLowerCase().includes(code.toLowerCase()));
    if (!prod) { alert('Δεν βρέθηκε'); return; }
    const isBox = confirm(`${prod.name}\nΟΚ = Κιβώτια, Άκυρο = Μονάδα`);
    const type = isBox ? 'boxes' : 'second';
    const val = parseFloat(prompt('Ποσότητα:', '1'));
    if (isNaN(val) || val<0) return;
    if (type==='boxes') prod.boxes += Math.floor(val);
    else prod.secondValue += val;
    saveToStorage();
    refreshUI();
  };
  window.exportPDF = () => {
    const all = [];
    categories.forEach(cat => { cat.products.forEach(p => { if (p.boxes>0 || p.secondValue>0) all.push({ catName: cat.name, ...p }); }); });
    if (!all.length) { alert('Κανένα απόθεμα.'); return; }
    const grouped = {};
    all.forEach(p => { if (!grouped[p.catName]) grouped[p.catName] = []; grouped[p.catName].push(p); });
    const formatQty = (val, unit) => {
      if (val === 0) return '';
      let num = (unit === 'kg') ? val.toFixed(1) : val.toFixed(0);
      let unitText = { pieces:'τεμ.', kg:'kg', pallet:'παλ.' }[unit] || '';
      return `${num} ${unitText}`;
    };
    let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>THASSOS IMPERIAL</title><style>body{font-family:sans-serif;font-size:12px;padding:20px;background:white}h1{color:#1e3a5f;text-align:center}.date{text-align:center;margin:4px 0 24px}.category{margin-top:24px}.category h2{background:#1e3a5f;color:white;padding:8px 12px;border-radius:8px}table{width:100%;border-collapse:collapse}th{background:#d9e6f2;font-weight:700;padding:8px 4px;border:1px solid #a0bbd0}td{border:1px solid #ccc;padding:8px 4px}td:first-child{font-weight:500}td:nth-child(2),td:nth-child(3){text-align:center}.non-zero{background:#d4edda!important}@media print{body{padding:0;margin:.5cm}}</style></head><body><h1>THASSOS IMPERIAL</h1><div class="date">${new Date().toLocaleDateString('el-GR')}</div>`;
    for (let catName in grouped) {
      html += `<div class="category"><h2>${escapeHtml(catName)}</h2><table><thead><tr><th>Προϊόν</th><th>Κιβώτια</th><th>Ποσότητα</th></tr></thead><tbody>`;
      grouped[catName].forEach(p => {
        html += `<tr><td>${escapeHtml(p.name)}</td><td class="${p.boxes>0?'non-zero':''}">${p.boxes||''}</td><td class="${p.secondValue>0?'non-zero':''}">${formatQty(p.secondValue,p.secondUnit)}</td></tr>`;
      });
      html += `</tbody></table></div>`;
    }
    html += `<div class="footer" style="margin-top:30px;text-align:center;color:#6f8fae">Thank You</div></body></html>`;
    const win = window.open('', '_blank');
    win.document.write(html);
    win.document.close();
    win.print();
  };

  // --- Scroll & Search ---
  const scrollBtn = document.getElementById('scrollToTopBtn');
  const searchSection = document.getElementById('searchSection');
  function updateSearchVisibility() {
    if (window.scrollY <= 10) searchSection.classList.remove('hidden');
    else searchSection.classList.add('hidden');
  }
  window.addEventListener('scroll', () => {
    if (window.scrollY > 300) scrollBtn.classList.add('visible');
    else scrollBtn.classList.remove('visible');
    updateSearchVisibility();
  });
  scrollBtn.addEventListener('click', () => { window.scrollTo({ top: 0, behavior: 'smooth' }); searchSection.classList.remove('hidden'); });
  window.toggleSearch = () => { searchSection.classList.remove('hidden'); document.getElementById('search').focus(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
  updateSearchVisibility();
  refreshUI();
</script>
</body>
</html>
